name: course_tracker
description: YouTube course progress tracker
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/video_library.png" # Your transparent icon
  
  # This tells Android to put a solid color behind your transparent logo
  adaptive_icon_background: "#2196F3" # Material Blue (or any hex code)
  adaptive_icon_foreground: "assets/icon/video_library.png"

